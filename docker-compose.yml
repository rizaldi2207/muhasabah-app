services:
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: muhasabah-harian-api
    environment:
      NODE_ENV: production
      PORT: "3001"
      DB_PATH: /data/app.db
      JWT_SECRET: ${JWT_SECRET:-ubah-rahasia-ini-di-produksi}
      ADMIN_NAME: ${ADMIN_NAME:-Administrator}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@muhasabah.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    volumes:
      - app-data:/data
    networks:
      - muhasabah-net
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: muhasabah-harian-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"
    networks:
      - muhasabah-net
    restart: unless-stopped

networks:
  muhasabah-net:
    name: muhasabah-net
    driver: bridge

volumes:
  app-data:
