# =====================================================================
# Reverse proxy Nginx (host) untuk Muhasabah Harian
# Letakkan di: /etc/nginx/sites-available/muhasabah-harian.conf
# lalu symlink ke /etc/nginx/sites-enabled/
#
# GANTI "muhasabah.example.com" dengan domain Anda.
#
# Alur: Internet → Nginx host (TLS) → 127.0.0.1:8080 (container "web" = Nginx
# yang menyajikan SPA & mem-proxy /api ke container "api").
#
# Catatan TLS: jalankan `certbot --nginx -d muhasabah.example.com` SETELAH
# memasang file ini. Certbot akan menambahkan blok `listen 443 ssl` dan
# pengalihan HTTP→HTTPS secara otomatis.
# =====================================================================

# Batas laju untuk endpoint login (mitigasi brute force).
limit_req_zone $binary_remote_addr zone=mh_login:10m rate=10r/m;

# Alamat container "web" di host. Jika port 8080 dipakai servis lain, cukup ubah
# angka DI SINI (samakan dengan WEB_PORT pada .env), lalu `nginx -t && reload`.
upstream muhasabah_web {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    listen [::]:80;
    server_name muhasabah.example.com;

    # Lokasi tantangan ACME (verifikasi sertifikat Let's Encrypt).
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Ukuran maksimum body (cukup besar untuk payload JSON biasa).
    client_max_body_size 2m;

    # Kompresi.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Header keamanan dasar.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Perketat endpoint login.
    location = /api/auth/login {
        limit_req zone=mh_login burst=5 nodelay;
        proxy_pass http://muhasabah_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Seluruh trafik lainnya (SPA + /api) diteruskan ke container web.
    location / {
        proxy_pass http://muhasabah_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
